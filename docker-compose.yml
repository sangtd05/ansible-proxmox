services:
  ansible:
    image: python:3.12-slim
    entrypoint: ["sh", "-c", "apt-get update -qq && apt-get install -y -qq sshpass > /dev/null 2>&1 && pip install --quiet ansible proxmoxer requests kubernetes && ansible-galaxy collection install community.proxmox kubernetes.core --force && sleep infinity"]
    volumes:
      - ./ansible.cfg:/ansible/ansible.cfg:ro
      - ./inventory:/ansible/inventory:ro
      - ./playbooks:/ansible/playbooks:ro
      - ./roles:/ansible/roles:ro
      - ./group_vars:/ansible/group_vars:ro
      - pip-cache:/root/.cache/pip
    env_file:
      - .env
    working_dir: /ansible

volumes:
  pip-cache:
