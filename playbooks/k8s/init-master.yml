---
- name: Initialize Kubernetes control plane
  hosts: k8s-manager
  gather_facts: true
  become: true
  vars:
    pod_network_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
  tasks:
    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr={{ pod_network_cidr }} --service-cidr={{ service_cidr }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for heno user
      file:
        path: /home/heno/.kube
        state: directory
        owner: heno
        group: heno
        mode: '0755'

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/heno/.kube/config
        remote_src: true
        owner: heno
        group: heno
        mode: '0600'

    - name: Install Flannel CNI plugin
      become: false
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /home/heno/.kube/config

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command to file
      copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/kubeadm-join-command.txt
        mode: '0600'

    - name: Display join command
      debug:
        msg: "Worker join command: {{ join_command.stdout }}"
