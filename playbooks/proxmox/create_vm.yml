---
- name: Create VM on Proxmox
  hosts: proxmox
  gather_facts: false
  vars:
    proxmox_api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
    proxmox_api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
    proxmox_api_password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
    proxmox_node: pve
    proxmox_storage: local-lvm
    proxmox_bridge: vmbr0
    proxmox_iso_storage: local
  tasks:
    - name: Create VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        name: "{{ vm_name }}"
        memory: "{{ vm_memory | default(2048) }}"
        cores: "{{ vm_cores | default(2) }}"
        sockets: 1
        ostype: l26
        net:
          net0: "virtio,bridge={{ proxmox_bridge }}"
        virtio:
          virtio0: "{{ proxmox_storage }}:{{ vm_disk_size | default('20') }}"
        ide:
          ide2: "{{ proxmox_iso_storage }}:iso/{{ vm_iso | default('ubuntu-24.04.3-live-server-amd64.iso') }},media=cdrom"
        boot: order=ide2
        state: present
        validate_certs: false
      delegate_to: localhost

    - name: Start VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        state: started
        validate_certs: false
      delegate_to: localhost
